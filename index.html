                                                                                                                            });
                                                                                                                            if (!open) {
                                                                                                                                list.style.display = 'block';
                                                                                                                                combobox.setAttribute('aria-expanded', 'true');
                                                                                                                            }
                                                                                                                            e.stopPropagation();
                                                                                                                            return;
                                                                                                                        }
                                                                                                                        document.querySelectorAll('[role="listbox"]').forEach(function (l) {
                                                                                                                            l.style.display = 'none';
                                                                                                                            var cb = l.closest('[role="combobox"]');
                                                                                                                            if (cb) cb.setAttribute('aria-expanded', 'false');
                                                                                                                        });
                                                                                                                    });

                                                                                                                    var searchInput = document.getElementById('SearchBox7');
                                                                                                                    if (searchInput) {
                                                                                                                        var searchRoot = searchInput.closest('.root-190');
                                                                                                                        searchInput.addEventListener('focus', function () {
                                                                                                                            if (searchRoot) searchRoot.classList.add('is-active');
                                                                                                                        });
                                                                                                                        searchInput.addEventListener('blur', function () {
                                                                                                                            if (searchRoot && !searchInput.value) searchRoot.classList.remove('is-active');
                                                                                                                        });
                                                                                                                    }
                                                                                                                })();
                                                                                                            </script>
